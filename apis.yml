aid: inscribe
name: Inscribe
description: >
  Inscribe is an AI-powered document fraud detection platform founded in 2017,
  serving banks, credit unions, fintechs, and lending institutions. The platform
  uses agentic AI trained by fraud experts to detect forged, manipulated, and
  AI-generated documents including bank statements, pay stubs, tax forms,
  invoices, and identity documents. Inscribe's REST API provides programmatic
  access to fraud detection, document verification, credit insights, and
  transaction enrichment workflows at scale. Financial institutions integrate
  the API to automate underwriting, onboarding, KYC/KYB, and bank account
  verification decisions, with results delivered via webhook or polling. The
  platform processes millions of applications annually and serves notable
  customers including Bluevine, Ramp, Plaid, and BHG Financial.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
