apis:
  - aid: inscribe:document-fraud-detection-api
    name: Inscribe Document Fraud Detection API
    description: >
      RESTful API for uploading and analyzing financial documents for fraud
      detection and data extraction. Supports bank statements, pay stubs, tax
      forms, invoices, and identity documents. Provides fraud signals,
      forensic analysis, and structured data extraction with results delivered
      via webhook or polling. Includes customer management, bank account
      analysis, collect sessions, open banking data ingestion, and transaction
      enrichment endpoints.
    humanURL: https://docs.inscribe.ai/reference/overview
    baseURL: https://api.inscribe.ai/api/v2
